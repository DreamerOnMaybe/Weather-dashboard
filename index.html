<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
</head>
<body>
    <div class="container">
        <div class="main__card">
            <img src="./img/weather.svg" alt="" class="cloud__decoration">
            <p class="location"></p>
            <div class="temperature">
                <h1 class="number"></h1>
                <p class="middle__temp"></p>
            </div>
            <div class="statistics">
                <div class="statistics__card">
                    <img src="img/wind.svg" alt="">
                    <div class="info">
                        <h4>Ветер</h4>
                        <p class="wind"></p>
                    </div>
                </div>
                <div class="statistics__card ">
                    <img src="img/humidity.svg" alt="">
                    <div class="info">
                        <h4>Влажность</h4>
                        <p class="humidity"></p>
                    </div>
                </div>
                <div class="statistics__card">
                    <img src="img/rain.svg" alt="">
                    <div class="info">
                        <h4>Дождь</h4>
                        <p class="rain"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="right__side">
            <div class="air__quality">
            <div class="air__quality-title">
                <img src="img/leaf.svg" alt="">
                <h3>Качество воздуха</h3>
            </div>
            <div class="quality">
                <p class="boa"></p>
                <h3 class="index"></h3>
            </div>
            <div class="quality__info">
                <div class="number__info">
                    <h3 class="pm2_5"></h3>
                    <p>PM2.5</p>
                </div>
                <div class="number__info">
                    <h3 class="pm10"></h3>
                    <p>PM10</p>
                </div>
                <div class="number__info">
                    <h3 class="so2"></h3>
                    <p>sO₂</p>
                </div>
                <div class="number__info">
                    <h3 class="no2"></h3>
                    <p>NO₂</p>
                </div>
                <div class="number__info">
                    <h3 class="o3"></h3>
                    <p>O₃</p>
                </div>
                <div class="number__info">
                    <h3 class="co"></h3>
                    <p>CO</p>
                </div>
            </div>
        </div>

        <div class="sun__time">
            <div class="sun__time-title">
                <img src="./img/time.svg" alt="">
                <h2>Дневное время</h2>

            <div class="weak__weather-item">
                <h2 class="item__title">Сегодня</h2>
                <img src="./img/cloudy.svg" alt="">
                <p class="item__temp">21° <span>16°</span></p>
            </div>
            <div class="weak__weather-item">
                <h2 class="item__title">Пятница</h2>
                <img src="./img/sunny.svg" alt="">
                <p class="item__temp">28° <span>20°</span></p>
            </div>
            <div class="weak__weather-item">
                <h2 class="item__title">Суббота</h2>
                <img src="./img/rainy.svg" alt="">
                <p class="item__temp">25° <span>21°</span></p>
            </div>
            <div class="weak__weather-item">
                <h2 class="item__title">Воскресенье</h2>
                <img src="./img/thunderstorm.svg" alt="">
                <p class="item__temp">20° <span>14°</span></p>
            </div>
            <div class="weak__weather-item">
                <h2 class="item__title">Понедельник</h2>
                <img src="./img/partlyСloudy.svg" alt="">
                <p class="item__temp">24° <span>18°</span></p>
            </div>
        </div>
        </div>
    </div>
